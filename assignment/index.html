<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spendr — Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-theme="light">

  <!-- Storage warning banner (hidden by default) -->
  <div id="storage-warning" hidden>
    <span>⚠️ Could not load saved data. Storage may be unavailable or corrupted.</span>
    <button type="button" id="dismiss-warning" aria-label="Dismiss warning">✕</button>
  </div>

  <header>
    <div class="header-brand">
      <span class="brand-icon">💸</span>
      <span class="brand-name">Spendr</span>
    </div>
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
  </header>

  <main>
    <!-- Balance display -->
    <section class="balance-section" aria-label="Total balance">
      <p class="balance-label">Total Spent</p>
      <p class="balance-amount"><span id="balance">$0.00</span></p>
    </section>

    <!-- Add transaction form -->
    <section class="form-section" aria-label="Add transaction">
      <h2>New Transaction</h2>
      <form id="expense-form" novalidate>
        <div class="form-row">
          <div class="field">
            <label for="item-name">Item</label>
            <input type="text" id="item-name" name="item-name" placeholder="e.g. Lunch" autocomplete="off">
          </div>
          <div class="field field--small">
            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" name="amount" placeholder="0.00" min="0.01" step="0.01">
          </div>
        </div>
        <div class="field">
          <label for="category">Category</label>
          <div class="category-pills" role="group" aria-label="Category">
            <input type="radio" name="category" id="cat-food" value="Food">
            <label for="cat-food" class="pill pill--food">🍔 Food</label>
            <input type="radio" name="category" id="cat-transport" value="Transport">
            <label for="cat-transport" class="pill pill--transport">🚌 Transport</label>
            <input type="radio" name="category" id="cat-fun" value="Fun">
            <label for="cat-fun" class="pill pill--fun">🎉 Fun</label>
          </div>
        </div>
        <p id="form-error" role="alert" aria-live="polite"></p>
        <button type="submit">Add Transaction</button>
      </form>
    </section>

    <!-- Transaction list -->
    <section class="list-section" aria-label="Transaction list">
      <h2>Transactions</h2>
      <div class="sort-controls">
        <label for="sort-select">Sort by:</label>
        <select id="sort-select">
          <option value="default">Default (date added)</option>
          <option value="amount-asc">Amount: Low → High</option>
          <option value="amount-desc">Amount: High → Low</option>
          <option value="category-asc">Category: A → Z</option>
        </select>
      </div>
      <ul id="transaction-list" aria-label="All transactions"></ul>
    </section>

    <!-- Chart -->
    <section class="chart-section" aria-label="Spending by category">
      <h2>Spending by Category</h2>
      <canvas id="expense-chart" aria-label="Pie chart of spending by category" role="img"></canvas>
      <p id="chart-placeholder">No transactions yet. Add one to see the chart.</p>
    </section>

    <!-- Monthly Summary -->
    <section class="summary-section" id="monthly-summary" aria-label="Monthly spending summary">
      <h2>Monthly Summary</h2>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
